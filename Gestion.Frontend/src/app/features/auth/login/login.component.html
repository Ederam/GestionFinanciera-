<div class="login-container">
  <div class="glass-panel login-card">
    
    <div class="header">
      <div class="logo-circle"></div>
      <h2>Finance<span class="text-primary">Pro</span></h2>
      <p class="subtitle">Accede a tu panel financiero</p>
    </div>

    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
      
      <div class="form-group">
        <label class="form-label" for="email">Correo Electrónico</label>
        <input 
          id="email" 
          type="email" 
          class="form-input" 
          formControlName="email"
          placeholder="admin@camilo.com"
          autocomplete="email">
          <div *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched" class="error-text">
            Por favor ingresa un correo válido.
          </div>
      </div>

      <div class="form-group">
        <label class="form-label" for="password">Contraseña</label>
        <input 
          id="password" 
          type="password" 
          class="form-input" 
          formControlName="password"
          placeholder="••••••••"
          autocomplete="current-password">
      </div>

      <div *ngIf="errorMessage" class="error-banner">
        {{ errorMessage }}
      </div>

      <button type="submit" class="btn-primary w-full" [disabled]="isLoading">
        {{ isLoading ? 'Conectando...' : 'Iniciar Sesión' }}
      </button>

    </form>
    
  </div>
</div>
